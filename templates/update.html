<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Post</title>
</head>
<body>
    <form action="/update/{{ post['id'] }}" method="POST">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="{{ post['title'] }}" required><br>
        <label for="author">Author</label>
        <input type="text" id="author" name="author" value="{{ post['author'] }}" required><br>
        <label for="content">Content</label>
        <textarea id="content" name="content" required>{{ post['content'] }}</textarea><br>
        <button type="submit" value="Update">Update Post</button>
    </form>
</body>
</html>
